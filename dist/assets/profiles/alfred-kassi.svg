<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="mugBg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2520"/>
      <stop offset="40%" stop-color="#1e1a16"/>
      <stop offset="100%" stop-color="#0d0b09"/>
    </linearGradient>
    <linearGradient id="skin1" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#6B4A35"/>
      <stop offset="50%" stop-color="#5C3D2E"/>
      <stop offset="100%" stop-color="#4A3025"/>
    </linearGradient>
    <linearGradient id="light1" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="grain1">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="grain"/>
    </filter>
    <clipPath id="frame1"><rect width="200" height="200" rx="10"/></clipPath>
  </defs>

  <g clip-path="url(#frame1)">
    <!-- Background wall -->
    <rect width="200" height="200" fill="url(#mugBg1)"/>
    <rect width="200" height="200" fill="url(#light1)"/>

    <!-- Height measurement lines -->
    <g stroke="#555" stroke-opacity="0.4" stroke-width="0.6">
      <line x1="0" y1="20" x2="200" y2="20"/>
      <line x1="0" y1="40" x2="200" y2="40"/>
      <line x1="0" y1="60" x2="200" y2="60"/>
      <line x1="0" y1="80" x2="200" y2="80"/>
      <line x1="0" y1="100" x2="200" y2="100"/>
      <line x1="0" y1="120" x2="200" y2="120"/>
    </g>
    <!-- Height numbers -->
    <g font-family="'Courier New',monospace" font-size="7" fill="#666" fill-opacity="0.5">
      <text x="4" y="18">6'0</text>
      <text x="4" y="38">5'10</text>
      <text x="4" y="58">5'8</text>
      <text x="4" y="78">5'6</text>
      <text x="4" y="98">5'4</text>
    </g>
    <!-- Vertical ruler -->
    <line x1="28" y1="15" x2="28" y2="125" stroke="#555" stroke-opacity="0.3" stroke-width="0.5"/>

    <!-- Neck -->
    <rect x="84" y="105" width="32" height="28" rx="5" fill="url(#skin1)"/>

    <!-- Body / dark t-shirt -->
    <ellipse cx="100" cy="162" rx="58" ry="38" fill="#1a1815"/>
    <rect x="42" y="148" width="116" height="52" fill="#1a1815"/>
    <path d="M80 130 Q100 142 120 130" fill="none" stroke="#252220" stroke-width="1.2"/>

    <!-- Head shape — young, lean -->
    <ellipse cx="100" cy="68" rx="32" ry="40" fill="url(#skin1)"/>

    <!-- Hair — short tight curls -->
    <ellipse cx="100" cy="36" rx="31" ry="14" fill="#0f0a07"/>
    <rect x="69" y="28" width="62" height="18" rx="10" fill="#0f0a07"/>
    <!-- Hair texture dots -->
    <g fill="#1a1210" opacity="0.6">
      <circle cx="80" cy="34" r="1.5"/><circle cx="90" cy="30" r="1.5"/>
      <circle cx="100" cy="29" r="1.5"/><circle cx="110" cy="30" r="1.5"/>
      <circle cx="120" cy="34" r="1.5"/><circle cx="85" cy="38" r="1"/>
      <circle cx="95" cy="35" r="1"/><circle cx="105" cy="35" r="1"/>
      <circle cx="115" cy="38" r="1"/>
    </g>

    <!-- Ears -->
    <ellipse cx="67" cy="70" rx="5.5" ry="9" fill="#4A3025"/>
    <ellipse cx="67" cy="70" rx="3" ry="6" fill="#3d2820" opacity="0.4"/>
    <ellipse cx="133" cy="70" rx="5.5" ry="9" fill="#4A3025"/>
    <ellipse cx="133" cy="70" rx="3" ry="6" fill="#3d2820" opacity="0.4"/>

    <!-- Brow ridge -->
    <path d="M76 58 Q88 54 100 56 Q112 54 124 58" fill="#4a3225" opacity="0.5"/>

    <!-- Nose — broader, African features -->
    <path d="M96 72 Q100 88 104 72" fill="none" stroke="#4A3025" stroke-width="1" opacity="0.5"/>
    <ellipse cx="100" cy="82" rx="8" ry="4.5" fill="#4A3025" opacity="0.35"/>
    <circle cx="94" cy="82" r="2.5" fill="#3d2820" opacity="0.25"/>
    <circle cx="106" cy="82" r="2.5" fill="#3d2820" opacity="0.25"/>

    <!-- Mouth -->
    <path d="M88 94 Q94 97 100 96 Q106 97 112 94" fill="#3a2218" opacity="0.7"/>
    <path d="M90 95 Q100 100 110 95" fill="none" stroke="#2a1810" stroke-width="0.8"/>

    <!-- Chin definition -->
    <ellipse cx="100" cy="104" rx="14" ry="6" fill="#4a3225" opacity="0.15"/>

    <!-- Neck shadow -->
    <ellipse cx="100" cy="110" rx="22" ry="5" fill="#000" opacity="0.15"/>

    <!-- BLACK BAR over eyes -->
    <rect x="58" y="58" width="84" height="20" rx="1" fill="#000" opacity="0.92"/>

    <!-- Grain overlay -->
    <rect width="200" height="200" filter="url(#grain1)" opacity="0.08"/>

    <!-- Vignette -->
    <rect width="200" height="200" fill="url(#mugBg1)" opacity="0.15" rx="10"/>

    <!-- Booking plate area -->
    <rect x="0" y="148" width="200" height="52" fill="#0a0908" opacity="0.85"/>

    <!-- Booking number -->
    <text x="100" y="164" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" font-weight="bold" fill="#999" letter-spacing="3">CI-240429</text>

    <!-- Name -->
    <text x="100" y="180" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="#ccc" font-weight="bold" letter-spacing="2">ALFRED KASSI</text>

    <!-- Date -->
    <text x="100" y="194" text-anchor="middle" font-family="'Courier New',monospace" font-size="7" fill="#666" letter-spacing="1">2025-04-29 · INTERPOL</text>
  </g>
</svg>