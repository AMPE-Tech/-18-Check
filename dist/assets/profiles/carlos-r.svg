<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <defs>
    <filter id="blur"><feGaussianBlur stdDeviation="2.5"/></filter>
    <linearGradient id="sk" x1=".3" y1="0" x2=".7" y2="1">
      <stop offset="0%" stop-color="#C49468"/><stop offset="100%" stop-color="#A67D52"/>
    </linearGradient>
    <clipPath id="c"><circle cx="50" cy="50" r="50"/></clipPath>
  </defs>
  <g clip-path="url(#c)">
    <rect width="100" height="100" fill="#1a1a22"/>
    <g filter="url(#blur)">
      <!-- Neck -->
      <rect x="40" y="60" width="20" height="16" rx="4" fill="url(#sk)"/>
      <!-- Body / shirt -->
      <ellipse cx="50" cy="88" rx="38" ry="22" fill="#2a3040"/>
      <rect x="12" y="80" width="76" height="20" fill="#2a3040"/>
      <!-- Collar -->
      <path d="M40 72 L50 78 L60 72" fill="none" stroke="#3a4050" stroke-width="1.5"/>
      <!-- Head -->
      <ellipse cx="50" cy="36" rx="21" ry="26" fill="url(#sk)"/>
      <!-- Hair short -->
      <path d="M30 26 Q30 8 50 6 Q70 8 70 26" fill="#1a1008"/>
      <rect x="30" y="10" width="40" height="10" rx="6" fill="#1a1008"/>
      <!-- Eyes -->
      <ellipse cx="42" cy="34" rx="3" ry="1.8" fill="#1a0e08"/>
      <ellipse cx="58" cy="34" rx="3" ry="1.8" fill="#1a0e08"/>
      <!-- Brow -->
      <path d="M36 30 Q42 28 48 30" fill="#6a5040" opacity=".4"/>
      <path d="M52 30 Q58 28 64 30" fill="#6a5040" opacity=".4"/>
      <!-- Nose -->
      <ellipse cx="50" cy="42" rx="3.5" ry="2.5" fill="#A67D52" opacity=".35"/>
      <!-- Mouth -->
      <path d="M44 49 Q50 52 56 49" fill="#7a5040" opacity=".4"/>
      <!-- Stubble -->
      <ellipse cx="50" cy="52" rx="12" ry="8" fill="#5a4030" opacity=".08"/>
      <!-- Ears -->
      <ellipse cx="28" cy="38" rx="3" ry="5" fill="#A67D52"/>
      <ellipse cx="72" cy="38" rx="3" ry="5" fill="#A67D52"/>
    </g>
    <rect width="100" height="100" fill="#1a1a22" opacity=".08"/>
  </g>
</svg>