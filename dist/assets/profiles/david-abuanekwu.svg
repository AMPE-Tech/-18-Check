<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
    <linearGradient id="skin" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#5E3A1E"/>
      <stop offset="100%" stop-color="#4C2F18"/>
    </linearGradient>
  </defs>

  <rect width="200" height="200" fill="url(#bg)" rx="12"/>

  <!-- Neck - thicker -->
  <rect x="83" y="108" width="34" height="24" rx="5" fill="url(#skin)"/>

  <!-- Shoulders / polo shirt -->
  <ellipse cx="100" cy="158" rx="56" ry="32" fill="#1a3a1a"/>
  <rect x="44" y="148" width="112" height="52" rx="2" fill="#1a3a1a"/>
  <!-- Collar -->
  <path d="M90 130 L90 138" fill="none" stroke="#2a4a2a" stroke-width="1.5"/>
  <path d="M110 130 L110 138" fill="none" stroke="#2a4a2a" stroke-width="1.5"/>

  <!-- Head - angular -->
  <ellipse cx="100" cy="70" rx="33" ry="40" fill="url(#skin)"/>

  <!-- Hair - very short buzz -->
  <ellipse cx="100" cy="38" rx="30" ry="12" fill="#0d0806"/>
  <rect x="70" y="30" width="60" height="15" rx="8" fill="#0d0806"/>

  <!-- Ears -->
  <ellipse cx="66" cy="72" rx="5.5" ry="9" fill="#4C2F18"/>
  <ellipse cx="134" cy="72" rx="5.5" ry="9" fill="#4C2F18"/>

  <!-- Nose -->
  <ellipse cx="100" cy="82" rx="7.5" ry="5.5" fill="#4C2F18" opacity="0.45"/>

  <!-- Mouth -->
  <path d="M89 96 Q100 101 111 96" fill="none" stroke="#361f10" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Goatee -->
  <ellipse cx="100" cy="102" rx="10" ry="6" fill="#1a0f08" opacity="0.35"/>

  <!-- BLACK BAR over eyes -->
  <rect x="62" y="61" width="76" height="18" rx="1" fill="#000"/>
</svg>