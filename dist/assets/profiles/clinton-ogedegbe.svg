<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="mugBg2" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#262220"/>
      <stop offset="50%" stop-color="#1a1714"/>
      <stop offset="100%" stop-color="#0e0c0a"/>
    </linearGradient>
    <linearGradient id="skin2" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#7A5438"/>
      <stop offset="50%" stop-color="#6B4830"/>
      <stop offset="100%" stop-color="#553A26"/>
    </linearGradient>
    <linearGradient id="light2" x1="0.8" y1="0" x2="0.2" y2="0.8">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="grain2">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <clipPath id="frame2"><rect width="200" height="200" rx="10"/></clipPath>
  </defs>

  <g clip-path="url(#frame2)">
    <rect width="200" height="200" fill="url(#mugBg2)"/>
    <rect width="200" height="200" fill="url(#light2)"/>

    <!-- Height lines -->
    <g stroke="#555" stroke-opacity="0.35" stroke-width="0.6">
      <line x1="0" y1="20" x2="200" y2="20"/>
      <line x1="0" y1="40" x2="200" y2="40"/>
      <line x1="0" y1="60" x2="200" y2="60"/>
      <line x1="0" y1="80" x2="200" y2="80"/>
      <line x1="0" y1="100" x2="200" y2="100"/>
      <line x1="0" y1="120" x2="200" y2="120"/>
    </g>
    <g font-family="'Courier New',monospace" font-size="7" fill="#666" fill-opacity="0.45">
      <text x="4" y="18">6'2</text>
      <text x="4" y="38">6'0</text>
      <text x="4" y="58">5'10</text>
      <text x="4" y="78">5'8</text>
      <text x="4" y="98">5'6</text>
    </g>
    <line x1="28" y1="15" x2="28" y2="125" stroke="#555" stroke-opacity="0.25" stroke-width="0.5"/>

    <!-- Thick neck -->
    <rect x="82" y="105" width="36" height="28" rx="6" fill="url(#skin2)"/>

    <!-- Body / hoodie -->
    <ellipse cx="100" cy="160" rx="60" ry="40" fill="#2a2628"/>
    <rect x="40" y="146" width="120" height="54" fill="#2a2628"/>
    <!-- Hood strings -->
    <line x1="92" y1="132" x2="90" y2="148" stroke="#3a3638" stroke-width="1"/>
    <line x1="108" y1="132" x2="110" y2="148" stroke="#3a3638" stroke-width="1"/>
    <!-- Kangaroo pocket -->
    <path d="M72 162 Q100 170 128 162" fill="none" stroke="#222" stroke-width="0.8"/>

    <!-- Head — round, full cheeks -->
    <ellipse cx="100" cy="66" rx="38" ry="42" fill="url(#skin2)"/>

    <!-- Hair — high-top fade -->
    <rect x="74" y="18" width="52" height="22" rx="4" fill="#0d0806"/>
    <path d="M70 40 Q70 20 100 16 Q130 20 130 40" fill="#0d0806"/>
    <!-- Fade sides -->
    <path d="M66 55 Q66 42 74 35" fill="#1a110d" opacity="0.4"/>
    <path d="M134 55 Q134 42 126 35" fill="#1a110d" opacity="0.4"/>

    <!-- Ears — close to head -->
    <ellipse cx="61" cy="70" rx="5" ry="8" fill="#553A26"/>
    <ellipse cx="139" cy="70" rx="5" ry="8" fill="#553A26"/>

    <!-- Brow -->
    <path d="M72 56 Q86 52 100 54 Q114 52 128 56" fill="#553A26" opacity="0.45"/>

    <!-- Round nose -->
    <ellipse cx="100" cy="80" rx="9" ry="5.5" fill="#553A26" opacity="0.4"/>
    <circle cx="94" cy="80" r="3" fill="#4a3220" opacity="0.2"/>
    <circle cx="106" cy="80" r="3" fill="#4a3220" opacity="0.2"/>

    <!-- Full lips -->
    <path d="M86 93 Q93 96 100 95 Q107 96 114 93" fill="#4a2a1a" opacity="0.6"/>
    <path d="M88 94 Q100 100 112 94" fill="none" stroke="#3a1a0e" stroke-width="1"/>

    <!-- Double chin hint -->
    <path d="M78 108 Q100 116 122 108" fill="#553A26" opacity="0.15"/>

    <!-- Neck shadow -->
    <ellipse cx="100" cy="112" rx="24" ry="5" fill="#000" opacity="0.12"/>

    <!-- BLACK BAR -->
    <rect x="54" y="56" width="92" height="20" rx="1" fill="#000" opacity="0.92"/>

    <!-- Grain -->
    <rect width="200" height="200" filter="url(#grain2)" opacity="0.07"/>

    <!-- Booking plate -->
    <rect x="0" y="148" width="200" height="52" fill="#0a0908" opacity="0.85"/>
    <text x="100" y="164" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" font-weight="bold" fill="#999" letter-spacing="3">NC-250415</text>
    <text x="100" y="180" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#ccc" font-weight="bold" letter-spacing="2">CLINTON OGEDEGBE</text>
    <text x="100" y="194" text-anchor="middle" font-family="'Courier New',monospace" font-size="7" fill="#666" letter-spacing="1">2025-04-15 · FBI / DOJ</text>
  </g>
</svg>