<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#12121a"/>
    </linearGradient>
  </defs>

  <rect width="200" height="200" fill="url(#bg)" rx="16"/>

  <!-- Mugshot height lines -->
  <line x1="20" y1="30" x2="20" y2="110" stroke="#333" stroke-width="0.5"/>
  <line x1="16" y1="40" x2="24" y2="40" stroke="#444" stroke-width="0.5"/>
  <line x1="16" y1="55" x2="24" y2="55" stroke="#444" stroke-width="0.5"/>
  <line x1="16" y1="70" x2="24" y2="70" stroke="#444" stroke-width="0.5"/>
  <line x1="16" y1="85" x2="24" y2="85" stroke="#444" stroke-width="0.5"/>
  <line x1="16" y1="100" x2="24" y2="100" stroke="#444" stroke-width="0.5"/>

  <circle cx="100" cy="52" r="22" fill="#1a1a25"/>
  <ellipse cx="100" cy="100" rx="38" ry="22" fill="#1a1a25"/>
  <rect x="62" y="95" width="76" height="20" fill="#1a1a25"/>

  <circle cx="100" cy="70" r="50" fill="none" stroke="#f59e0b" stroke-opacity="0.06" stroke-width="30"/>

  <!-- Corner brackets -->
  <path d="M10 28 L10 10 L28 10" fill="none" stroke="#f59e0b" stroke-opacity="0.5" stroke-width="2" stroke-linecap="round"/>
  <path d="M172 10 L190 10 L190 28" fill="none" stroke="#f59e0b" stroke-opacity="0.5" stroke-width="2" stroke-linecap="round"/>
  <path d="M10 172 L10 190 L28 190" fill="none" stroke="#f59e0b" stroke-opacity="0.5" stroke-width="2" stroke-linecap="round"/>
  <path d="M172 190 L190 190 L190 172" fill="none" stroke="#f59e0b" stroke-opacity="0.5" stroke-width="2" stroke-linecap="round"/>

  <!-- FICHADO diagonal stamp -->
  <g transform="translate(100,75) rotate(-25)">
    <rect x="-52" y="-14" width="104" height="28" rx="3" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-opacity="0.8"/>
    <text x="0" y="6" text-anchor="middle" font-family="Arial Black,Arial,sans-serif" font-size="18" font-weight="900" fill="#f59e0b" fill-opacity="0.85" letter-spacing="4">FICHADO</text>
  </g>

  <!-- Name plate -->
  <rect x="15" y="130" width="170" height="28" rx="4" fill="#111118" stroke="#333" stroke-width="0.8"/>
  <text x="100" y="148" text-anchor="middle" font-family="Courier New,monospace" font-size="10" font-weight="bold" fill="white" fill-opacity="0.95">CLINTON OGEDEGBE</text>

  <text x="100" y="172" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#888" letter-spacing="2">NIGÉRIA</text>

  <rect x="58" y="178" width="84" height="16" rx="8" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-opacity="0.5" stroke-width="0.8"/>
  <text x="100" y="190" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#f59e0b" letter-spacing="1.5">INDICIADO</text>
</svg>