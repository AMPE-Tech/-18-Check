<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
    <linearGradient id="skin" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#6B4226"/>
      <stop offset="100%" stop-color="#553620"/>
    </linearGradient>
  </defs>

  <rect width="200" height="200" fill="url(#bg)" rx="12"/>

  <!-- Neck -->
  <rect x="86" y="110" width="28" height="20" rx="4" fill="url(#skin)"/>

  <!-- Shoulders / hoodie -->
  <ellipse cx="100" cy="155" rx="54" ry="32" fill="#333"/>
  <rect x="46" y="145" width="108" height="55" rx="2" fill="#333"/>
  <!-- Hood line -->
  <path d="M75 135 Q100 128 125 135" fill="none" stroke="#444" stroke-width="1.2"/>

  <!-- Head - rounder face -->
  <ellipse cx="100" cy="72" rx="36" ry="42" fill="url(#skin)"/>

  <!-- Hair - fade cut -->
  <path d="M66 55 Q66 28 100 26 Q134 28 134 55" fill="#0f0a08"/>
  <rect x="68" y="30" width="64" height="12" rx="6" fill="#0f0a08"/>

  <!-- Ears -->
  <ellipse cx="63" cy="74" rx="5" ry="8" fill="#553620"/>
  <ellipse cx="137" cy="74" rx="5" ry="8" fill="#553620"/>

  <!-- Nose - wider -->
  <ellipse cx="100" cy="84" rx="8" ry="5" fill="#553620" opacity="0.4"/>

  <!-- Mouth -->
  <path d="M88 97 Q100 103 112 97" fill="none" stroke="#3a2518" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Beard shadow -->
  <ellipse cx="100" cy="100" rx="22" ry="12" fill="#2a1a10" opacity="0.2"/>

  <!-- BLACK BAR over eyes -->
  <rect x="58" y="63" width="84" height="18" rx="1" fill="#000"/>
</svg>