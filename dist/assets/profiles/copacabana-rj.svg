<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2=".2" y2="1">
      <stop offset="0%" stop-color="#221c1c"/><stop offset="100%" stop-color="#0c0a0a"/>
    </linearGradient>
    <linearGradient id="sk" x1=".3" y1="0" x2=".7" y2="1">
      <stop offset="0%" stop-color="#8C6040"/><stop offset="100%" stop-color="#6A4830"/>
    </linearGradient>
    <linearGradient id="hr" x1=".5" y1="0" x2=".5" y2="1">
      <stop offset="0%" stop-color="#1a0a04"/><stop offset="100%" stop-color="#0e0402"/>
    </linearGradient>
    <filter id="gr"><feTurbulence type="fractalNoise" baseFrequency=".88" numOctaves="4" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/><feBlend in="SourceGraphic" mode="multiply"/></filter>
    <clipPath id="f"><rect width="200" height="200" rx="10"/></clipPath>
  </defs>
  <g clip-path="url(#f)">
    <rect width="200" height="200" fill="url(#bg)"/>
    <g stroke="#555" stroke-opacity=".35" stroke-width=".6">
      <line x1="0" y1="20" x2="200" y2="20"/><line x1="0" y1="40" x2="200" y2="40"/>
      <line x1="0" y1="60" x2="200" y2="60"/><line x1="0" y1="80" x2="200" y2="80"/>
      <line x1="0" y1="100" x2="200" y2="100"/><line x1="0" y1="120" x2="200" y2="120"/>
    </g>
    <g font-family="'Courier New',monospace" font-size="7" fill="#666" fill-opacity=".45">
      <text x="4" y="18">5'9</text><text x="4" y="38">5'7</text>
      <text x="4" y="58">5'5</text><text x="4" y="78">5'3</text>
    </g>
    <line x1="28" y1="15" x2="28" y2="125" stroke="#555" stroke-opacity=".25" stroke-width=".5"/>
    <!-- Neck slender -->
    <rect x="88" y="106" width="24" height="22" rx="4" fill="url(#sk)"/>
    <!-- Body - tight dress -->
    <ellipse cx="100" cy="158" rx="48" ry="34" fill="#2a1020"/>
    <rect x="52" y="144" width="96" height="56" fill="#2a1020"/>
    <path d="M76 130 Q100 140 124 130" fill="none" stroke="#3a1830" stroke-width="1.2"/>
    <!-- Head feminine -->
    <ellipse cx="100" cy="64" rx="30" ry="40" fill="url(#sk)"/>
    <!-- Long wavy hair -->
    <path d="M64 48 Q62 14 100 10 Q138 14 136 48" fill="url(#hr)"/>
    <path d="M64 48 Q58 70 54 100 Q52 120 56 135" fill="url(#hr)"/>
    <path d="M136 48 Q142 70 146 100 Q148 120 144 135" fill="url(#hr)"/>
    <path d="M66 42 Q76 10 100 6 Q124 10 134 42" fill="#1a0a04"/>
    <!-- Hair waves -->
    <path d="M58 65 Q56 80 58 95" fill="none" stroke="#0e0402" stroke-width="1" opacity=".3"/>
    <path d="M142 65 Q144 80 142 95" fill="none" stroke="#0e0402" stroke-width="1" opacity=".3"/>
    <!-- Ears hidden by hair -->
    <ellipse cx="69" cy="66" rx="3.5" ry="6" fill="#6A4830" opacity=".5"/>
    <ellipse cx="131" cy="66" rx="3.5" ry="6" fill="#6A4830" opacity=".5"/>
    <!-- Hoop earrings -->
    <circle cx="68" cy="74" r="4" fill="none" stroke="#C4A050" stroke-width="1.2" opacity=".7"/>
    <circle cx="132" cy="74" r="4" fill="none" stroke="#C4A050" stroke-width="1.2" opacity=".7"/>
    <!-- Shaped brows -->
    <path d="M78 52 Q88 49 96 51" fill="#5a3a25" opacity=".4"/>
    <path d="M104 51 Q112 49 122 52" fill="#5a3a25" opacity=".4"/>
    <!-- Nose refined -->
    <ellipse cx="100" cy="78" rx="5.5" ry="3.5" fill="#6A4830" opacity=".25"/>
    <!-- Full lips -->
    <path d="M88 90 Q94 87 100 88 Q106 87 112 90" fill="#8a3535" opacity=".55"/>
    <path d="M89 91 Q100 96 111 91" fill="#7a2828" opacity=".35"/>
    <!-- Cheekbones -->
    <ellipse cx="78" cy="76" rx="7" ry="3.5" fill="#A07050" opacity=".12" transform="rotate(-12,78,76)"/>
    <ellipse cx="122" cy="76" rx="7" ry="3.5" fill="#A07050" opacity=".12" transform="rotate(12,122,76)"/>
    <!-- BLACK BAR -->
    <rect x="64" y="53" width="72" height="18" rx="1" fill="#000" opacity=".92"/>
    <rect width="200" height="200" filter="url(#gr)" opacity=".07"/>
    <rect x="0" y="148" width="200" height="52" fill="#0a0908" opacity=".85"/>
    <text x="100" y="164" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" font-weight="bold" fill="#999" letter-spacing="3">RJ-250402</text>
    <text x="100" y="180" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#ccc" font-weight="bold" letter-spacing="2">COPACABANA / RJ</text>
    <text x="100" y="194" text-anchor="middle" font-family="'Courier New',monospace" font-size="7" fill="#666" letter-spacing="1">2025-04-02 · PCRJ</text>
  </g>
</svg>