<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
    <linearGradient id="skin" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#694530"/>
      <stop offset="100%" stop-color="#523826"/>
    </linearGradient>
  </defs>

  <rect width="200" height="200" fill="url(#bg)" rx="12"/>

  <!-- Neck -->
  <rect x="84" y="108" width="32" height="24" rx="5" fill="url(#skin)"/>

  <!-- Shoulders / t-shirt -->
  <ellipse cx="100" cy="156" rx="55" ry="33" fill="#1a1a2e"/>
  <rect x="45" y="146" width="110" height="54" rx="2" fill="#1a1a2e"/>
  <!-- Round neck -->
  <path d="M82 132 Q100 140 118 132" fill="none" stroke="#252540" stroke-width="1.5"/>

  <!-- Head - wide jaw -->
  <path d="M66 60 Q66 30 100 28 Q134 30 134 60 L132 90 Q130 112 100 114 Q70 112 68 90 Z" fill="url(#skin)"/>

  <!-- Hair - short top -->
  <path d="M68 50 Q68 25 100 22 Q132 25 132 50" fill="#0e0906"/>
  <rect x="70" y="26" width="60" height="14" rx="6" fill="#0e0906"/>

  <!-- Ears -->
  <ellipse cx="65" cy="70" rx="6" ry="9.5" fill="#523826"/>
  <ellipse cx="135" cy="70" rx="6" ry="9.5" fill="#523826"/>

  <!-- Nose -->
  <ellipse cx="100" cy="84" rx="8" ry="5.5" fill="#523826" opacity="0.4"/>

  <!-- Mouth -->
  <path d="M87 98 Q100 104 113 98" fill="none" stroke="#3a2418" stroke-width="1.6" stroke-linecap="round"/>

  <!-- Full beard -->
  <path d="M72 85 Q72 115 100 118 Q128 115 128 85" fill="#1a0e06" opacity="0.3"/>

  <!-- BLACK BAR over eyes -->
  <rect x="60" y="60" width="80" height="18" rx="1" fill="#000"/>
</svg>