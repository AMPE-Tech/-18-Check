<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2=".15" y2="1">
      <stop offset="0%" stop-color="#221e1a"/><stop offset="100%" stop-color="#0b0a08"/>
    </linearGradient>
    <linearGradient id="sk" x1=".4" y1="0" x2=".6" y2="1">
      <stop offset="0%" stop-color="#7A5235"/><stop offset="100%" stop-color="#5E4028"/>
    </linearGradient>
    <linearGradient id="hr" x1=".5" y1="0" x2=".5" y2="1">
      <stop offset="0%" stop-color="#0e0604"/><stop offset="100%" stop-color="#060302"/>
    </linearGradient>
    <filter id="gr"><feTurbulence type="fractalNoise" baseFrequency=".88" numOctaves="4" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/><feBlend in="SourceGraphic" mode="multiply"/></filter>
    <clipPath id="f"><rect width="200" height="200" rx="10"/></clipPath>
  </defs>
  <g clip-path="url(#f)">
    <rect width="200" height="200" fill="url(#bg)"/>
    <g stroke="#555" stroke-opacity=".35" stroke-width=".6">
      <line x1="0" y1="20" x2="200" y2="20"/><line x1="0" y1="40" x2="200" y2="40"/>
      <line x1="0" y1="60" x2="200" y2="60"/><line x1="0" y1="80" x2="200" y2="80"/>
      <line x1="0" y1="100" x2="200" y2="100"/><line x1="0" y1="120" x2="200" y2="120"/>
    </g>
    <g font-family="'Courier New',monospace" font-size="7" fill="#666" fill-opacity=".45">
      <text x="4" y="18">5'6</text><text x="4" y="38">5'4</text>
      <text x="4" y="58">5'2</text><text x="4" y="78">5'0</text>
    </g>
    <line x1="28" y1="15" x2="28" y2="125" stroke="#555" stroke-opacity=".25" stroke-width=".5"/>
    <!-- Neck -->
    <rect x="88" y="106" width="24" height="20" rx="4" fill="url(#sk)"/>
    <!-- Necklace -->
    <path d="M82 112 Q100 118 118 112" fill="none" stroke="#C4A050" stroke-width=".8" opacity=".5"/>
    <!-- Body - blouse -->
    <ellipse cx="100" cy="158" rx="52" ry="34" fill="#1a2030"/>
    <rect x="48" y="144" width="104" height="56" fill="#1a2030"/>
    <path d="M78 130 Q100 138 122 130" fill="none" stroke="#253040" stroke-width="1.2"/>
    <!-- Head - rounder, feminine -->
    <ellipse cx="100" cy="64" rx="32" ry="40" fill="url(#sk)"/>
    <!-- Hair - braids/locs pulled back -->
    <path d="M66 48 Q64 16 100 12 Q136 16 134 48" fill="url(#hr)"/>
    <path d="M68 42 Q76 12 100 8 Q124 12 132 42" fill="#0e0604"/>
    <!-- Hair pulled back tight -->
    <path d="M72 40 Q86 34 100 32 Q114 34 128 40" fill="#0e0604"/>
    <!-- Hair bun on top -->
    <ellipse cx="100" cy="14" rx="16" ry="10" fill="#0e0604"/>
    <ellipse cx="100" cy="14" rx="12" ry="7" fill="#1a0e08" opacity=".4"/>
    <!-- Ears -->
    <ellipse cx="67" cy="66" rx="4.5" ry="7.5" fill="#5E4028"/>
    <ellipse cx="133" cy="66" rx="4.5" ry="7.5" fill="#5E4028"/>
    <!-- Earrings - dangling -->
    <line x1="67" y1="74" x2="67" y2="80" stroke="#C4A050" stroke-width=".8" opacity=".6"/>
    <circle cx="67" cy="82" r="2" fill="#C4A050" opacity=".5"/>
    <line x1="133" y1="74" x2="133" y2="80" stroke="#C4A050" stroke-width=".8" opacity=".6"/>
    <circle cx="133" cy="82" r="2" fill="#C4A050" opacity=".5"/>
    <!-- Brows - arched feminine -->
    <path d="M78 52 Q86 48 94 50" fill="#4a3020" opacity=".4"/>
    <path d="M106 50 Q114 48 122 52" fill="#4a3020" opacity=".4"/>
    <!-- Nose -->
    <ellipse cx="100" cy="76" rx="6.5" ry="4" fill="#5E4028" opacity=".3"/>
    <!-- Full lips -->
    <path d="M88 88 Q94 86 100 87 Q106 86 112 88" fill="#6a3028" opacity=".5"/>
    <path d="M90 89 Q100 93 110 89" fill="#5a2520" opacity=".3"/>
    <!-- Cheekbones -->
    <ellipse cx="80" cy="74" rx="7" ry="3" fill="#8a6040" opacity=".1" transform="rotate(-10,80,74)"/>
    <ellipse cx="120" cy="74" rx="7" ry="3" fill="#8a6040" opacity=".1" transform="rotate(10,120,74)"/>
    <!-- BLACK BAR -->
    <rect x="62" y="53" width="76" height="18" rx="1" fill="#000" opacity=".92"/>
    <rect width="200" height="200" filter="url(#gr)" opacity=".07"/>
    <rect x="0" y="148" width="200" height="52" fill="#0a0908" opacity=".85"/>
    <text x="100" y="164" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" font-weight="bold" fill="#999" letter-spacing="3">UT-231018</text>
    <text x="100" y="180" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="#ccc" font-weight="bold" letter-spacing="2">NELLY IDOWU</text>
    <text x="100" y="194" text-anchor="middle" font-family="'Courier New',monospace" font-size="7" fill="#666" letter-spacing="1">2023-10-18 · FBI / DOJ</text>
  </g>
</svg>