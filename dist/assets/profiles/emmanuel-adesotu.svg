<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
    <linearGradient id="skin" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#7B4B2A"/>
      <stop offset="100%" stop-color="#614022"/>
    </linearGradient>
  </defs>

  <rect width="200" height="200" fill="url(#bg)" rx="12"/>

  <!-- Neck -->
  <rect x="86" y="110" width="28" height="20" rx="4" fill="url(#skin)"/>

  <!-- Shoulders / dress shirt -->
  <ellipse cx="100" cy="155" rx="52" ry="30" fill="#222"/>
  <rect x="48" y="145" width="104" height="55" rx="2" fill="#222"/>
  <!-- Tie -->
  <polygon points="97,132 103,132 101,160 99,160" fill="#8B0000"/>
  <!-- Collar -->
  <path d="M85 130 L97 140" fill="none" stroke="#333" stroke-width="1.5"/>
  <path d="M115 130 L103 140" fill="none" stroke="#333" stroke-width="1.5"/>

  <!-- Head - longer face -->
  <ellipse cx="100" cy="70" rx="32" ry="42" fill="url(#skin)"/>

  <!-- Hair - receding -->
  <path d="M72 50 Q72 30 100 28 Q128 30 128 50" fill="#110c08"/>
  <path d="M76 45 Q100 30 124 45" fill="#110c08"/>

  <!-- Ears -->
  <ellipse cx="67" cy="72" rx="5" ry="8.5" fill="#614022"/>
  <ellipse cx="133" cy="72" rx="5" ry="8.5" fill="#614022"/>

  <!-- Nose -->
  <ellipse cx="100" cy="83" rx="6.5" ry="5" fill="#614022" opacity="0.4"/>

  <!-- Mouth -->
  <path d="M91 96 Q100 100 109 96" fill="none" stroke="#4a2a15" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Mustache hint -->
  <path d="M88 90 Q100 93 112 90" fill="#2a1508" opacity="0.25"/>

  <!-- BLACK BAR over eyes -->
  <rect x="62" y="61" width="76" height="18" rx="1" fill="#000"/>
</svg>