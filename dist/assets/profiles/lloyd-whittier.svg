<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="mugBg6" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#222028"/>
      <stop offset="50%" stop-color="#181620"/>
      <stop offset="100%" stop-color="#0c0b10"/>
    </linearGradient>
    <linearGradient id="skin6" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#C49872"/>
      <stop offset="50%" stop-color="#B08560"/>
      <stop offset="100%" stop-color="#98724E"/>
    </linearGradient>
    <linearGradient id="light6" x1="0.7" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="grain6">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <clipPath id="frame6"><rect width="200" height="200" rx="10"/></clipPath>
  </defs>

  <g clip-path="url(#frame6)">
    <rect width="200" height="200" fill="url(#mugBg6)"/>
    <rect width="200" height="200" fill="url(#light6)"/>

    <g stroke="#555" stroke-opacity="0.35" stroke-width="0.6">
      <line x1="0" y1="20" x2="200" y2="20"/>
      <line x1="0" y1="40" x2="200" y2="40"/>
      <line x1="0" y1="60" x2="200" y2="60"/>
      <line x1="0" y1="80" x2="200" y2="80"/>
      <line x1="0" y1="100" x2="200" y2="100"/>
      <line x1="0" y1="120" x2="200" y2="120"/>
    </g>
    <g font-family="'Courier New',monospace" font-size="7" fill="#666" fill-opacity="0.45">
      <text x="4" y="18">5'11</text>
      <text x="4" y="38">5'9</text>
      <text x="4" y="58">5'7</text>
      <text x="4" y="78">5'5</text>
      <text x="4" y="98">5'3</text>
    </g>
    <line x1="30" y1="15" x2="30" y2="125" stroke="#555" stroke-opacity="0.25" stroke-width="0.5"/>

    <!-- Neck -->
    <rect x="86" y="106" width="28" height="24" rx="4" fill="url(#skin6)"/>

    <!-- Body / blazer over henley -->
    <ellipse cx="100" cy="160" rx="56" ry="36" fill="#1e1c28"/>
    <rect x="44" y="146" width="112" height="54" fill="#1e1c28"/>
    <!-- Blazer structure -->
    <path d="M86 128 L72 155" fill="none" stroke="#28263a" stroke-width="2"/>
    <path d="M114 128 L128 155" fill="none" stroke="#28263a" stroke-width="2"/>
    <!-- Inner henley -->
    <rect x="90" y="128" width="20" height="26" rx="2" fill="#3a3540"/>
    <circle cx="100" cy="134" r="1" fill="#4a4550"/>
    <circle cx="100" cy="139" r="1" fill="#4a4550"/>

    <!-- Head — more angular, handsome features -->
    <ellipse cx="100" cy="66" rx="33" ry="42" fill="url(#skin6)"/>

    <!-- Hair — styled, medium length, side-swept -->
    <path d="M66 48 Q66 16 100 12 Q134 16 134 48" fill="#2a1a0c"/>
    <path d="M68 44 Q80 22 100 18 Q120 22 132 44" fill="#2a1a0c"/>
    <!-- Volume on top -->
    <path d="M72 38 Q82 14 110 14 Q130 16 130 38" fill="#321e0e"/>
    <!-- Side sweep -->
    <path d="M70 42 Q80 28 100 22" fill="none" stroke="#1e1008" stroke-width="1.5"/>
    <path d="M75 46 Q85 32 105 26" fill="none" stroke="#1e1008" stroke-width="1"/>

    <!-- Ears -->
    <ellipse cx="66" cy="70" rx="5" ry="8" fill="#98724E"/>
    <ellipse cx="134" cy="70" rx="5" ry="8" fill="#98724E"/>

    <!-- Defined brows -->
    <path d="M76 54 Q88 50 98 52" fill="#6a5040" opacity="0.5"/>
    <path d="M102 52 Q112 50 124 54" fill="#6a5040" opacity="0.5"/>

    <!-- Nose — straighter, narrower -->
    <path d="M98 64 L97 80 Q100 84 103 80 L102 64" fill="#98724E" opacity="0.2"/>
    <ellipse cx="100" cy="81" rx="6.5" ry="3.5" fill="#98724E" opacity="0.3"/>

    <!-- 5 o'clock shadow -->
    <path d="M74 80 Q74 108 100 112 Q126 108 126 80" fill="#5a4030" opacity="0.08"/>

    <!-- Mouth — defined -->
    <path d="M90 93 Q95 95 100 94 Q105 95 110 93" fill="#8a5e40" opacity="0.4"/>
    <path d="M92 94 Q100 97 108 94" fill="none" stroke="#6a4530" stroke-width="0.8"/>

    <!-- Chin dimple hint -->
    <circle cx="100" cy="104" r="2" fill="#8a6850" opacity="0.15"/>

    <ellipse cx="100" cy="110" rx="20" ry="4" fill="#000" opacity="0.1"/>

    <!-- BLACK BAR -->
    <rect x="60" y="55" width="80" height="20" rx="1" fill="#000" opacity="0.92"/>

    <rect width="200" height="200" filter="url(#grain6)" opacity="0.07"/>

    <rect x="0" y="148" width="200" height="52" fill="#0a0908" opacity="0.85"/>
    <text x="100" y="164" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" font-weight="bold" fill="#999" letter-spacing="3">CA-240718</text>
    <text x="100" y="180" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#ccc" font-weight="bold" letter-spacing="2">C.E. LLOYD</text>
    <text x="100" y="194" text-anchor="middle" font-family="'Courier New',monospace" font-size="7" fill="#666" letter-spacing="1">2024-07-18 · FBI / DOJ</text>
  </g>
</svg>