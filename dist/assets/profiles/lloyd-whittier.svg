<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
    <linearGradient id="skin" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#C4956A"/>
      <stop offset="100%" stop-color="#A87D5A"/>
    </linearGradient>
  </defs>

  <rect width="200" height="200" fill="url(#bg)" rx="12"/>

  <!-- Neck -->
  <rect x="86" y="108" width="28" height="22" rx="4" fill="url(#skin)"/>

  <!-- Shoulders / jacket -->
  <ellipse cx="100" cy="155" rx="54" ry="32" fill="#2a2a30"/>
  <rect x="46" y="145" width="108" height="55" rx="2" fill="#2a2a30"/>
  <!-- Jacket lapels -->
  <path d="M88 132 L80 155" fill="none" stroke="#3a3a40" stroke-width="1.5"/>
  <path d="M112 132 L120 155" fill="none" stroke="#3a3a40" stroke-width="1.5"/>
  <!-- Inner shirt -->
  <rect x="92" y="132" width="16" height="25" fill="#ddd"/>

  <!-- Head -->
  <ellipse cx="100" cy="68" rx="34" ry="42" fill="url(#skin)"/>

  <!-- Hair - styled, medium length -->
  <path d="M66 52 Q66 22 100 18 Q134 22 134 52" fill="#2a1a0a"/>
  <path d="M66 48 Q80 35 100 32 Q120 35 134 48" fill="#2a1a0a"/>
  <!-- Side part -->
  <path d="M82 28 Q85 35 82 45" fill="none" stroke="#1a1005" stroke-width="1"/>

  <!-- Ears -->
  <ellipse cx="65" cy="72" rx="5" ry="8" fill="#A87D5A"/>
  <ellipse cx="135" cy="72" rx="5" ry="8" fill="#A87D5A"/>

  <!-- Nose -->
  <ellipse cx="100" cy="82" rx="6" ry="4.5" fill="#A87D5A" opacity="0.4"/>

  <!-- Mouth -->
  <path d="M91 96 Q100 100 109 96" fill="none" stroke="#8a6545" stroke-width="1.3" stroke-linecap="round"/>

  <!-- 5 o'clock shadow -->
  <ellipse cx="100" cy="95" rx="20" ry="14" fill="#6a5040" opacity="0.1"/>

  <!-- BLACK BAR over eyes -->
  <rect x="60" y="60" width="80" height="18" rx="1" fill="#000"/>
</svg>