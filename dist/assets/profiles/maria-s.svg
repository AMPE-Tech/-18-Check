<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <defs>
    <filter id="blur"><feGaussianBlur stdDeviation="2.5"/></filter>
    <linearGradient id="sk" x1=".3" y1="0" x2=".7" y2="1">
      <stop offset="0%" stop-color="#D4A574"/><stop offset="100%" stop-color="#B8895A"/>
    </linearGradient>
    <linearGradient id="hr" x1=".5" y1="0" x2=".5" y2="1">
      <stop offset="0%" stop-color="#2a1508"/><stop offset="100%" stop-color="#1a0c04"/>
    </linearGradient>
    <clipPath id="c"><circle cx="50" cy="50" r="50"/></clipPath>
  </defs>
  <g clip-path="url(#c)">
    <rect width="100" height="100" fill="#1a1a22"/>
    <g filter="url(#blur)">
      <!-- Neck -->
      <rect x="42" y="62" width="16" height="14" rx="3" fill="url(#sk)"/>
      <!-- Body -->
      <ellipse cx="50" cy="88" rx="36" ry="20" fill="#8B2252"/>
      <rect x="14" y="82" width="72" height="18" fill="#8B2252"/>
      <!-- Head -->
      <ellipse cx="50" cy="38" rx="20" ry="24" fill="url(#sk)"/>
      <!-- Hair long -->
      <path d="M28 28 Q28 6 50 4 Q72 6 72 28" fill="url(#hr)"/>
      <path d="M28 28 Q26 42 24 58 Q23 66 26 74" fill="url(#hr)"/>
      <path d="M72 28 Q74 42 76 58 Q77 66 74 74" fill="url(#hr)"/>
      <path d="M30 24 Q38 6 50 4 Q62 6 70 24" fill="#2a1508"/>
      <!-- Eyes area -->
      <ellipse cx="42" cy="36" rx="3.5" ry="2" fill="#1a0e08"/>
      <ellipse cx="58" cy="36" rx="3.5" ry="2" fill="#1a0e08"/>
      <!-- Nose -->
      <ellipse cx="50" cy="44" rx="3" ry="2" fill="#B8895A" opacity=".4"/>
      <!-- Lips -->
      <path d="M44 50 Q50 53 56 50" fill="#C06060" opacity=".6"/>
      <!-- Earrings -->
      <circle cx="30" cy="40" r="1.5" fill="#C4A050" opacity=".5"/>
      <circle cx="70" cy="40" r="1.5" fill="#C4A050" opacity=".5"/>
    </g>
    <!-- Subtle noise overlay -->
    <rect width="100" height="100" fill="#1a1a22" opacity=".08"/>
  </g>
</svg>