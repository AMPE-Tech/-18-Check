<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
    <linearGradient id="skin" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#5C3D2E"/>
      <stop offset="100%" stop-color="#4A3228"/>
    </linearGradient>
  </defs>

  <rect width="200" height="200" fill="url(#bg)" rx="12"/>

  <!-- Neck -->
  <rect x="85" y="108" width="30" height="22" rx="4" fill="url(#skin)"/>

  <!-- Shoulders / shirt -->
  <ellipse cx="100" cy="155" rx="52" ry="30" fill="#2a2a2a"/>
  <rect x="48" y="145" width="104" height="55" rx="2" fill="#2a2a2a"/>
  <!-- Collar -->
  <path d="M88 130 L100 142 L112 130" fill="none" stroke="#333" stroke-width="1.5"/>

  <!-- Head -->
  <ellipse cx="100" cy="72" rx="34" ry="40" fill="url(#skin)"/>

  <!-- Hair - short cropped -->
  <ellipse cx="100" cy="42" rx="33" ry="16" fill="#1a1210"/>
  <rect x="67" y="35" width="66" height="18" rx="8" fill="#1a1210"/>

  <!-- Ears -->
  <ellipse cx="65" cy="72" rx="6" ry="9" fill="#4A3228"/>
  <ellipse cx="135" cy="72" rx="6" ry="9" fill="#4A3228"/>

  <!-- Nose -->
  <ellipse cx="100" cy="82" rx="7" ry="5" fill="#4A3228" opacity="0.5"/>

  <!-- Mouth -->
  <path d="M90 95 Q100 100 110 95" fill="none" stroke="#3a2820" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Jaw shadow -->
  <path d="M70 95 Q100 118 130 95" fill="none" stroke="#3a2820" stroke-width="0.8" opacity="0.3"/>

  <!-- BLACK BAR over eyes -->
  <rect x="60" y="62" width="80" height="18" rx="1" fill="#000"/>
</svg>