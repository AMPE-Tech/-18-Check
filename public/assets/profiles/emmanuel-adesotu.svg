<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="mugBg4" x1="0" y1="0" x2="0.15" y2="1">
      <stop offset="0%" stop-color="#242018"/>
      <stop offset="50%" stop-color="#181510"/>
      <stop offset="100%" stop-color="#0b0a08"/>
    </linearGradient>
    <linearGradient id="skin4" x1="0.4" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#8B5E3C"/>
      <stop offset="50%" stop-color="#7A5030"/>
      <stop offset="100%" stop-color="#624228"/>
    </linearGradient>
    <linearGradient id="light4" x1="0.6" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.16"/>
    </linearGradient>
    <filter id="grain4">
      <feTurbulence type="fractalNoise" baseFrequency="0.88" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <clipPath id="frame4"><rect width="200" height="200" rx="10"/></clipPath>
  </defs>

  <g clip-path="url(#frame4)">
    <rect width="200" height="200" fill="url(#mugBg4)"/>
    <rect width="200" height="200" fill="url(#light4)"/>

    <g stroke="#555" stroke-opacity="0.35" stroke-width="0.6">
      <line x1="0" y1="20" x2="200" y2="20"/>
      <line x1="0" y1="40" x2="200" y2="40"/>
      <line x1="0" y1="60" x2="200" y2="60"/>
      <line x1="0" y1="80" x2="200" y2="80"/>
      <line x1="0" y1="100" x2="200" y2="100"/>
      <line x1="0" y1="120" x2="200" y2="120"/>
    </g>
    <g font-family="'Courier New',monospace" font-size="7" fill="#666" fill-opacity="0.45">
      <text x="4" y="18">5'10</text>
      <text x="4" y="38">5'8</text>
      <text x="4" y="58">5'6</text>
      <text x="4" y="78">5'4</text>
      <text x="4" y="98">5'2</text>
    </g>
    <line x1="30" y1="15" x2="30" y2="125" stroke="#555" stroke-opacity="0.25" stroke-width="0.5"/>

    <!-- Neck — thinner, older -->
    <rect x="86" y="106" width="28" height="26" rx="4" fill="url(#skin4)"/>

    <!-- Body / suit jacket -->
    <ellipse cx="100" cy="160" rx="56" ry="36" fill="#1a1820"/>
    <rect x="44" y="146" width="112" height="54" fill="#1a1820"/>
    <!-- Lapels -->
    <path d="M86 128 L76 155" fill="none" stroke="#252230" stroke-width="1.5"/>
    <path d="M114 128 L124 155" fill="none" stroke="#252230" stroke-width="1.5"/>
    <!-- White shirt & tie -->
    <rect x="94" y="128" width="12" height="28" fill="#d0ccc5" opacity="0.8"/>
    <polygon points="97,130 103,130 101,155 99,155" fill="#6B0000"/>

    <!-- Head — longer, thinner, older -->
    <ellipse cx="100" cy="66" rx="30" ry="42" fill="url(#skin4)"/>

    <!-- Hair — receding, graying temples -->
    <path d="M76 45 Q78 26 100 24 Q122 26 124 45" fill="#1a1510"/>
    <!-- Receding hairline — exposed forehead -->
    <path d="M78 42 Q88 32 100 30 Q112 32 122 42" fill="url(#skin4)"/>
    <!-- Gray temples -->
    <path d="M72 50 Q72 44 76 42" fill="#3a3530" opacity="0.5"/>
    <path d="M128 50 Q128 44 124 42" fill="#3a3530" opacity="0.5"/>

    <!-- Ears -->
    <ellipse cx="69" cy="68" rx="5" ry="8.5" fill="#624228"/>
    <ellipse cx="131" cy="68" rx="5" ry="8.5" fill="#624228"/>

    <!-- Worry lines on forehead -->
    <g stroke="#624228" stroke-width="0.4" opacity="0.25">
      <path d="M82 38 Q100 36 118 38" fill="none"/>
      <path d="M84 42 Q100 40 116 42" fill="none"/>
    </g>

    <!-- Brow — heavier -->
    <path d="M76 55 Q88 51 100 53 Q112 51 124 55" fill="#5a3a25" opacity="0.5"/>

    <!-- Nose — distinguished -->
    <path d="M97 66 L96 80 Q100 85 104 80 L103 66" fill="#624228" opacity="0.2"/>
    <ellipse cx="100" cy="81" rx="7" ry="4" fill="#624228" opacity="0.3"/>

    <!-- Mustache -->
    <path d="M88 87 Q94 90 100 89 Q106 90 112 87" fill="#1a1008" opacity="0.4"/>

    <!-- Mouth — thinner -->
    <path d="M90 93 Q100 97 110 93" fill="#4a2a18" opacity="0.5"/>
    <path d="M92 94 Q100 97 108 94" fill="none" stroke="#3a1a0c" stroke-width="0.7"/>

    <!-- Nasolabial folds -->
    <path d="M82 75 Q86 88 90 94" fill="none" stroke="#5a3a25" stroke-width="0.5" opacity="0.2"/>
    <path d="M118 75 Q114 88 110 94" fill="none" stroke="#5a3a25" stroke-width="0.5" opacity="0.2"/>

    <ellipse cx="100" cy="110" rx="20" ry="4" fill="#000" opacity="0.1"/>

    <!-- BLACK BAR -->
    <rect x="62" y="55" width="76" height="20" rx="1" fill="#000" opacity="0.92"/>

    <rect width="200" height="200" filter="url(#grain4)" opacity="0.07"/>

    <rect x="0" y="148" width="200" height="52" fill="#0a0908" opacity="0.85"/>
    <text x="100" y="164" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" font-weight="bold" fill="#999" letter-spacing="3">UT-230412</text>
    <text x="100" y="180" text-anchor="middle" font-family="'Courier New',monospace" font-size="8" fill="#ccc" font-weight="bold" letter-spacing="2">EMMANUEL ADESOTU</text>
    <text x="100" y="194" text-anchor="middle" font-family="'Courier New',monospace" font-size="7" fill="#666" letter-spacing="1">2023-04-12 · FBI / DOJ</text>
  </g>
</svg>