<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <defs>
    <filter id="blur"><feGaussianBlur stdDeviation="2.5"/></filter>
    <linearGradient id="sk" x1=".3" y1="0" x2=".7" y2="1">
      <stop offset="0%" stop-color="#E8C4A0"/><stop offset="100%" stop-color="#D0AA84"/>
    </linearGradient>
    <linearGradient id="hr" x1=".5" y1="0" x2=".5" y2="1">
      <stop offset="0%" stop-color="#C08030"/><stop offset="100%" stop-color="#8A5A20"/>
    </linearGradient>
    <clipPath id="c"><circle cx="50" cy="50" r="50"/></clipPath>
  </defs>
  <g clip-path="url(#c)">
    <rect width="100" height="100" fill="#1a1a22"/>
    <g filter="url(#blur)">
      <!-- Neck -->
      <rect x="43" y="62" width="14" height="12" rx="3" fill="url(#sk)"/>
      <!-- Body / blouse -->
      <ellipse cx="50" cy="88" rx="34" ry="20" fill="#4a2060"/>
      <rect x="16" y="82" width="68" height="18" fill="#4a2060"/>
      <path d="M36 76 Q50 82 64 76" fill="none" stroke="#5a3070" stroke-width="1"/>
      <!-- Head -->
      <ellipse cx="50" cy="38" rx="19" ry="24" fill="url(#sk)"/>
      <!-- Hair - shoulder length, lighter -->
      <path d="M30 30 Q28 8 50 4 Q72 8 70 30" fill="url(#hr)"/>
      <path d="M30 30 Q28 44 26 58 Q25 64 28 70" fill="url(#hr)"/>
      <path d="M70 30 Q72 44 74 58 Q75 64 72 70" fill="url(#hr)"/>
      <path d="M32 26 Q40 6 50 4 Q60 6 68 26" fill="#C08030"/>
      <!-- Bangs -->
      <path d="M34 24 Q42 18 50 20 Q58 18 66 24" fill="#B07028"/>
      <!-- Eyes -->
      <ellipse cx="42" cy="36" rx="3.2" ry="2" fill="#2a1a10"/>
      <ellipse cx="58" cy="36" rx="3.2" ry="2" fill="#2a1a10"/>
      <!-- Lashes hint -->
      <path d="M39 34 Q42 33 45 34" fill="none" stroke="#2a1a10" stroke-width=".5"/>
      <path d="M55 34 Q58 33 61 34" fill="none" stroke="#2a1a10" stroke-width=".5"/>
      <!-- Nose -->
      <ellipse cx="50" cy="44" rx="2.5" ry="2" fill="#D0AA84" opacity=".35"/>
      <!-- Lips -->
      <path d="M44 50 Q50 53 56 50" fill="#C06868" opacity=".55"/>
      <!-- Earrings small -->
      <circle cx="30" cy="42" r="1" fill="#C4A050" opacity=".4"/>
      <circle cx="70" cy="42" r="1" fill="#C4A050" opacity=".4"/>
    </g>
    <rect width="100" height="100" fill="#1a1a22" opacity=".08"/>
  </g>
</svg>