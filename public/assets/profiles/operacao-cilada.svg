<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#201c1c"/><stop offset="100%" stop-color="#0a0808"/>
    </linearGradient>
    <linearGradient id="sk" x1=".3" y1="0" x2=".7" y2="1">
      <stop offset="0%" stop-color="#9A7558"/><stop offset="100%" stop-color="#7A5E42"/>
    </linearGradient>
    <linearGradient id="hr" x1=".5" y1="0" x2=".5" y2="1">
      <stop offset="0%" stop-color="#140a04"/><stop offset="100%" stop-color="#0a0402"/>
    </linearGradient>
    <filter id="gr"><feTurbulence type="fractalNoise" baseFrequency=".9" numOctaves="4" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/><feBlend in="SourceGraphic" mode="multiply"/></filter>
    <clipPath id="f"><rect width="200" height="200" rx="10"/></clipPath>
  </defs>
  <g clip-path="url(#f)">
    <rect width="200" height="200" fill="url(#bg)"/>
    <g stroke="#555" stroke-opacity=".35" stroke-width=".6">
      <line x1="0" y1="20" x2="200" y2="20"/><line x1="0" y1="40" x2="200" y2="40"/>
      <line x1="0" y1="60" x2="200" y2="60"/><line x1="0" y1="80" x2="200" y2="80"/>
      <line x1="0" y1="100" x2="200" y2="100"/><line x1="0" y1="120" x2="200" y2="120"/>
    </g>
    <g font-family="'Courier New',monospace" font-size="7" fill="#666" fill-opacity=".45">
      <text x="4" y="18">5'10</text><text x="4" y="38">5'8</text>
      <text x="4" y="58">5'6</text><text x="4" y="78">5'4</text>
    </g>
    <line x1="28" y1="15" x2="28" y2="125" stroke="#555" stroke-opacity=".25" stroke-width=".5"/>
    <!-- Neck -->
    <rect x="87" y="105" width="26" height="22" rx="4" fill="url(#sk)"/>
    <!-- Body - crop top -->
    <ellipse cx="100" cy="156" rx="50" ry="34" fill="#1a1020"/>
    <rect x="50" y="142" width="100" height="58" fill="#1a1020"/>
    <path d="M74 128 Q100 136 126 128" fill="none" stroke="#2a1830" stroke-width="1"/>
    <!-- Thin straps -->
    <line x1="80" y1="126" x2="76" y2="142" stroke="#2a1830" stroke-width="2"/>
    <line x1="120" y1="126" x2="124" y2="142" stroke="#2a1830" stroke-width="2"/>
    <!-- Head -->
    <ellipse cx="100" cy="62" rx="31" ry="40" fill="url(#sk)"/>
    <!-- Long straight hair - Brazilian style -->
    <path d="M64 44 Q62 12 100 8 Q138 12 136 44" fill="url(#hr)"/>
    <path d="M64 44 Q60 65 56 95 Q54 115 58 140" fill="url(#hr)"/>
    <path d="M136 44 Q140 65 144 95 Q146 115 142 140" fill="url(#hr)"/>
    <path d="M66 40 Q74 8 100 4 Q126 8 134 40" fill="#140a04"/>
    <!-- Bangs -->
    <path d="M70 36 Q85 28 100 30 Q115 28 130 36" fill="#140a04"/>
    <!-- Ears with studs -->
    <ellipse cx="68" cy="64" rx="3.5" ry="6" fill="#7A5E42" opacity=".5"/>
    <ellipse cx="132" cy="64" rx="3.5" ry="6" fill="#7A5E42" opacity=".5"/>
    <circle cx="68" cy="70" r="1.5" fill="#C4A050" opacity=".6"/>
    <circle cx="132" cy="70" r="1.5" fill="#C4A050" opacity=".6"/>
    <!-- Shaped brows -->
    <path d="M78 50 Q87 47 95 49" fill="#5a4030" opacity=".4"/>
    <path d="M105 49 Q113 47 122 50" fill="#5a4030" opacity=".4"/>
    <!-- Nose -->
    <ellipse cx="100" cy="76" rx="5.5" ry="3.5" fill="#7A5E42" opacity=".25"/>
    <!-- Lips -->
    <path d="M88 88 Q94 85 100 86 Q106 85 112 88" fill="#8a3838" opacity=".5"/>
    <path d="M90 89 Q100 94 110 89" fill="#6a2525" opacity=".3"/>
    <!-- Cheekbones -->
    <ellipse cx="80" cy="74" rx="6" ry="3" fill="#A08060" opacity=".1" transform="rotate(-10,80,74)"/>
    <ellipse cx="120" cy="74" rx="6" ry="3" fill="#A08060" opacity=".1" transform="rotate(10,120,74)"/>
    <!-- BLACK BAR -->
    <rect x="64" y="51" width="72" height="18" rx="1" fill="#000" opacity=".92"/>
    <rect width="200" height="200" filter="url(#gr)" opacity=".07"/>
    <rect x="0" y="148" width="200" height="52" fill="#0a0908" opacity=".85"/>
    <text x="100" y="164" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" font-weight="bold" fill="#999" letter-spacing="3">DF-190625</text>
    <text x="100" y="180" text-anchor="middle" font-family="'Courier New',monospace" font-size="8" fill="#ccc" font-weight="bold" letter-spacing="2">OPERAÇÃO CILADA</text>
    <text x="100" y="194" text-anchor="middle" font-family="'Courier New',monospace" font-size="7" fill="#666" letter-spacing="1">2019-06-25 · PCDF</text>
  </g>
